<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website with Comments</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .form-container { margin: 20px; }
        .form-field { margin-bottom: 10px; }
    </style>
</head>
<body>
    <!-- Your existing content -->

    <!-- Comments Section -->
    <section id="comments">
        <h2>Comments</h2>
        <div id="vercel-comments"></div>
    </section>

    <!-- Existing Firebase Auth Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "your-auth-domain",
            projectId: "your-project-id",
            storageBucket: "your-storage-bucket",
            messagingSenderId: "your-messaging-sender-id",
            appId: "your-app-id"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();

        document.getElementById('registerForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert('User registered successfully');
                })
                .catch((error) => {
                    alert(error.message);
                });
        });

        document.getElementById('loginForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert('Login successful');
                })
                .catch((error) => {
                    alert(error.message);
                });
        });
    </script>

    <!-- Vercel Comments Script -->
    <script src="https://comments.vercel.app/js/comments.js" async></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const vercelComments = new Comments({
                element: '#vercel-comments',
                apiKey: 'your-api-key',
                projectId: 'your-project-id'
            });
        });
    </script>
</body>
</html>
