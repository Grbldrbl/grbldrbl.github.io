<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Section</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .comment-box { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Comment Section</h1>
    <form id="commentForm">
        <input type="text" id="name" placeholder="Your name"><br>
        <textarea id="comment" rows="4" cols="50" placeholder="Write a comment..."></textarea><br>
        <button type="submit">Submit</button>
    </form>
    <div id="comments"></div>

    <script>
        const apiURL = 'https://grbldrbl-github-io.vercel.app/api/comments';

        async function fetchComments() {
            const response = await fetch(apiURL);
            const comments = await response.json();
            const commentsDiv = document.getElementById('comments');
            commentsDiv.innerHTML = '';
            comments.forEach(comment => {
                const commentBox = document.createElement('div');
                commentBox.className = 'comment-box';
                commentBox.textContent = comment.name + ': ' + comment.text;
                commentsDiv.appendChild(commentBox);
            });
        }

        document.getElementById('commentForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const comment = document.getElementById('comment').value;
            if (name && comment) {
                await fetch(apiURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, text: comment })
                });
                document.getElementById('name').value = '';
                document.getElementById('comment').value = '';
                fetchComments();
            }
        });

        fetchComments();
    </script>
</body>
</html>
